<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>程雨桐的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        /* 背景样式（保留你指定的配置） */
        body {
            background-image: url('img/logo.png');
            background-size: contain;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #f9f9f9;
            position: relative;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.7);
            z-index: -1;
        }

        /* 头部导航（卡通浅色系） */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 240, 245, 0.9); /* 浅粉色背景 */
            border-bottom: 3px solid #e1e48f; /* 浅粉紫边框 */
            padding: 10px 40px;
            position: relative;
            z-index: 10;
        }
        .logo img {
            height: 60px;
            visibility: hidden;
        }
        .menu a {
            color: #8a90e5; /* 浅玫红文字 */
            text-decoration: none;
            margin: 0 12px;
            font-size: 16px;
            font-weight: 500;
        }
        .menu a:hover {
            color: #c3e18c; /* hover浅一点 */
            text-shadow: 0 0 2px #d2d581;
        }

        /* 内容容器 */
        .container {
            width: 1200px;
            margin: 30px auto;
            position: relative;
            z-index: 5;
        }
        h2 {
            color: #529ad8; /* 卡通粉色标题 */
            margin: 20px 0 10px;
            border-left: 4px solid #7edb64; /* 浅粉紫边框 */
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 2px 4px rgba(255, 182, 193, 0.2); /* 浅粉色阴影 */
        }

        /* 个人简介模块（卡通浅边框） */
        .about {
            display: flex;
            gap: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px; /* 圆角更卡通 */
            border: 2px solid #e0f7fa; /* 浅青蓝边框 */
            box-shadow: 0 2px 8px rgba(173, 216, 230, 0.2);
        }
        .about-text p {
            line-height: 1.8;
            margin: 8px 0;
            color: #555;
        }

        /* 搜索框（卡通样式） */
        .search-box {
            margin: 20px 0;
        }
        .search-box input {
            padding: 8px 12px;
            width: 250px;
            border: 2px solid #e0f7fa; /* 浅青蓝边框 */
            border-radius: 20px; /* 圆形搜索框更卡通 */
            background: rgba(255,255,255,0.9);
            outline: none;
        }
        .search-box input:focus {
            border-color: #daee91; /* 聚焦变浅粉紫 */
        }
        .search-box button {
            padding: 8px 20px;
            background: #e3f86e; /* 浅粉紫按钮 */
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 20px;
            transition: background 0.3s;
            margin-left: 10px;
        }
        .search-box button:hover {
            background: #69c8e7;
        }

        /* 文章&图文卡片（卡通浅边框+圆角） */
        .content-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        .card {
            border: 2px solid #e0f7fa; /* 浅青蓝边框 */
            border-radius: 12px; /* 大圆角更卡通 */
            overflow: hidden;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 2px 6px rgba(173, 216, 230, 0.15);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #82dbd3; /* hover变浅粉紫 */
        }
        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 2px solid #f0f8ff; /* 图片下浅蓝边框 */
        }
        .card-body {
            padding: 12px;
        }
        .card h4 {
            margin-bottom: 6px;
            color: #7ec470; /* 卡通粉色标题 */
        }
        .card .date {
            font-size: 12px;
            color: #999;
        }

        /* 广告轮播（卡通边框） */
        .ad-box {
            width: 100%;
            height: 240px;
            background: rgba(255, 255, 255, 0.9);
            margin: 30px 0;
            overflow: hidden;
            position: relative;
            border-radius: 12px;
            border: 2px solid #e0f7fa;
        }
        .ad-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 核心：留言板整合发布功能（卡通样式） */
        .msg-form {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            border: 2px solid #ffc1e9; /* 浅粉紫边框 */
            box-shadow: 0 2px 8px rgba(255, 182, 193, 0.2);
        }
        /* 发布类型选择 */
        .msg-form .publish-type {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #e0f7fa; /* 浅青蓝虚线 */
        }
        .msg-form .publish-type label {
            color: #ff69b4;
            font-weight: 500;
            margin-right: 10px;
        }
        .msg-form .publish-type select {
            padding: 5px 10px;
            border: 2px solid #e0f7fa;
            border-radius: 8px;
            background: white;
            color: #555;
            outline: none;
        }
        /* 标题/日期输入 */
        .msg-form .publish-info {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .msg-form .publish-info input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #e0f7fa;
            border-radius: 8px;
            background: white;
            outline: none;
        }
        .msg-form .publish-info input:focus {
            border-color: #92e482;
        }
        /* 内容输入 */
        .msg-form textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 2px solid #e0f7fa;
            border-radius: 8px;
            background: white;
            outline: none;
            resize: vertical;
            margin-bottom: 15px;
        }
        .msg-form textarea:focus {
            border-color: #ddfc82;
        }
        /* 图片上传 */
        .msg-form .img-upload {
            margin-bottom: 15px;
        }
        .msg-form .img-upload label {
            color: #80d965;
            font-weight: 500;
            display: block;
            margin-bottom: 5px;
        }
        .msg-form #msgImgPreview {
            width: 150px;
            height: 100px;
            border: 2px dashed #e0f7fa; /* 卡通虚线边框 */
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            border-radius: 8px;
            overflow: hidden;
        }
        .msg-form #msgImgPreview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 提交按钮（卡通配色） */
        .msg-form button {
            padding: 10px 25px;
            background: #8ccff3;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 20px;
            transition: background 0.3s;
            font-size: 14px;
            font-weight: 500;
        }
        .msg-form button:hover {
            background: #b0e79f;
            box-shadow: 0 2px 4px rgba(255, 182, 193, 0.3);
        }
        /* 留言列表（卡通样式） */
        .msg-list {
            margin-top: 15px;
        }
        .msg-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.95);
            margin: 8px 0;
            border-radius: 12px;
            border: 2px solid #e0f7fa;
            box-shadow: 0 1px 4px rgba(173, 216, 230, 0.1);
        }
        .msg-item .msg-type {
            display: inline-block;
            padding: 2px 8px;
            background: #cbe481;
            color: white;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .msg-item .msg-title {
            color: #b5e18c;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .msg-item .msg-img {
            width: 200px;
            height: auto;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid #f0f8ff;
        }
        .msg-item small {
            color: #999;
            font-size: 12px;
        }

        /* 友情链接（卡通配色） */
        .link-box a {
            display: inline-block;
            margin: 8px 10px;
            color: #5c88e6;
            text-decoration: none;
        }
        .link-box a:hover {
            color: #4981e1;
            text-decoration: underline;
        }

        /* 底部（卡通浅色系） */
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(255, 240, 245, 0.9);
            border-top: 3px solid #ffc1e9;
            color: #6ae7f0;
            margin-top: 40px;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- 导航菜单 -->
    <div class="header">
        <div class="logo">
            <img src="" alt="个人logo">
        </div>
        <div class="menu">
            <a href="#about">首页</a>
            <a href="#article">文章分享</a>
            <a href="#media">图片/视频分享</a>
            <a href="#message">留言板</a>
            <a href="#ad">广告</a>
            <a href="#friendlink">友情连接</a>
        </div>
    </div>

    <div class="container">
        <!-- 个人信息简介、爱好 -->
        <section id="about">
            <h2>个人简介</h2>
            <div class="about">
                <div class="about-img">
                    <img width="180" src="img/logo1.png" alt="头像">
                </div>
                <div class="about-text">
                    <p><strong>姓名：</strong>程雨桐</p>
                    <p><strong>专业：</strong>自动化专业大二学生</p>
                    <p><strong>简介：</strong>热爱思考，逻辑推理运算。</p>
                    <p><strong>爱好：</strong>写技术文章、摄影、跑步、阅读计算机书籍。</p>
                </div>
            </div>
        </section>

        <!-- 搜索框：按标题、日期查询文章/图文 -->
        <div class="search-box">
            <input type="text" id="searchKey" placeholder="输入标题/日期搜索内容">
            <button onclick="searchContent()">搜索</button>
        </div>

        <!-- 每日文章分享 -->
        <section id="article">
            <h2>每日文章分享 <span style="color:red;font-size:14px;">【下方为最新发布内容】</span></h2>
            <div class="content-list" id="articleList"></div>
        </section>

        <!-- 图片/视频分享 -->
        <section id="media">
            <h2>图片/视频分享</h2>
            <div class="content-list" id="mediaList"></div>
        </section>

        <!-- 广告轮播 -->
        <section id="ad">
            <h2>推荐广告</h2>
            <div class="ad-box">
                <img id="adImg" src="img/ad1.jpg" alt="广告">
            </div>
        </section>

        <!-- 核心：留言板（整合发布文章/图文功能） -->
        <section id="message">
            <h2>留言板 / 发布内容</h2>
            <div class="msg-form">
                <!-- 发布类型选择：普通留言/文章/图文 -->
                <div class="publish-type">
                    <label>发布类型：</label>
                    <select id="publishType">
                        <option value="msg">普通留言</option>
                        <option value="article">发布文章</option>
                        <option value="media">发布图文</option>
                    </select>
                </div>

                <!-- 文章/图文专属：标题+日期（普通留言隐藏） -->
                <div class="publish-info" id="publishInfo" style="display: none;">
                    <input type="text" id="publishTitle" placeholder="输入标题">
                    <input type="date" id="publishDate" value="">
                </div>

                <!-- 内容输入框 -->
                <textarea id="msgInput" placeholder="写下你的留言/文章内容/图文描述..."></textarea>

                <!-- 图片上传（图文必填，其他可选） -->
                <div class="img-upload">
                    <label>上传图片（图文必填，其他可选）：</label>
                    <input type="file" id="msgImg" accept="image/*" onchange="previewMsgImg()">
                    <div id="msgImgPreview">未选择图片</div>
                </div>

                <!-- 统一提交按钮 -->
                <button onclick="submitContent()">提交/发布</button>
            </div>

            <!-- 留言/发布内容列表 -->
            <div class="msg-list" id="msgList"></div>
        </section>

        <!-- 友情链接 -->
        <section id="friendlink">
            <h2>友情连接</h2>
            <div class="link-box">
                <a href="https://www.csdn.net">CSDN技术社区</a>
                <a href="https://github.com">Github开源平台</a>
                <a href="https://www.runoob.com">菜鸟教程</a>
                <a href="https://blog.csdn.net">技术博客</a>
            </div>
        </section>
    </div>

    <footer>
        ©2026 程雨桐的个人网站 版权所有
    </footer>

    <script>
        // 初始化日期为今天
        document.getElementById("publishDate").value = new Date().toISOString().split("T")[0];
        
        // 全局数据
         let articleData = [
            {title:"软炸虾仁超下饭做法", date:"2026-06-19", desc:"新手也能零失败，掌握火候和调味技巧", link:"https://www.xiachufang.com/recipe/1000877/"},
            {title:"照烧鸡腿懒人做法", date:"2026-06-18", desc:"不用炒糖色，简单3步搞定，孩子超爱吃", link:"https://www.xiachufang.com/recipe/1002397/"},
            {title:"大虾柚子凉拌家常做法", date:"2026-06-16", desc:"脆爽不软烂，醋和辣椒的投放时机很重要", link:"https://www.xiachufang.com/recipe/1001085/"},
        ];
        let mediaData = [
            {title:"云南风景", date:"2026-06-19", desc:"好看",img:"img/pic1.png", link:"img/pic1.png"},
            {title:"哈尔滨风景", date:"2026-06-15", desc:"好玩",img:"img/pic2.png", link:"img/pic2.png"},
        ];
        let msgData = [];
        let adImgs = ["img/ad1.jpg","img/ad2.jpg","img/ad3.jpg"];
        let adLinks = ["https://www.meituan.com/", "https://www.taobao.com/","https://www.pinduoduo.com/"];
        let adIndex = 0;

        // ========== 核心：发布类型切换（显示/隐藏标题日期） ==========
        document.getElementById("publishType").addEventListener("change", function() {
            let type = this.value;
            let publishInfo = document.getElementById("publishInfo");
            // 只有文章/图文显示标题+日期，普通留言隐藏
            publishInfo.style.display = (type === "article" || type === "media") ? "flex" : "none";
        });

        // ========== 图片预览 ==========
        function previewMsgImg() {
            let preview = document.getElementById("msgImgPreview");
            let file = document.getElementById("msgImg").files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = function(event) {
                    preview.innerHTML = `<img src="${event.target.result}" alt="预览图片">`;
                }
                reader.readAsDataURL(file);
            } else {
                preview.innerHTML = "未选择图片";
            }
        }

        // ========== 统一提交/发布功能 ==========
        function submitContent() {
            // 获取所有输入值
            let type = document.getElementById("publishType").value;
            let content = document.getElementById("msgInput").value.trim();
            let title = document.getElementById("publishTitle").value.trim();
            let date = document.getElementById("publishDate").value.trim();
            let imgFile = document.getElementById("msgImg").files[0];
            let now = new Date().toLocaleString();
            let imgSrc = "";

            // 基础校验：内容不能为空
            if (!content) {
                alert("内容不能为空！");
                return;
            }

            // 不同类型的专属校验
            if (type === "article" || type === "media") {
                // 文章/图文必须填标题和日期
                if (!title || !date) {
                    alert("发布文章/图文必须填写标题和日期！");
                    return;
                }
                // 图文必须上传图片
                if (type === "media" && !imgFile) {
                    alert("发布图文必须上传图片！");
                    return;
                }
            }

            // 处理图片（转Base64）
            let handleSubmit = function(imgSrc) {
                // 1. 普通留言：只添加到留言列表
                if (type === "msg") {
                    msgData.unshift({
                        type: "普通留言",
                        content: content,
                        time: now,
                        img: imgSrc
                    });
                    renderMsgList();
                } 
                // 2. 发布文章：添加到文章列表 + 留言列表
                else if (type === "article") {
                    // 添加到文章数据
                    articleData.push({title, date, desc: content, link:"#"});
                    renderArticle();
                    // 添加到留言列表（记录发布）
                    msgData.unshift({
                        type: "发布文章",
                        title: title,
                        content: content,
                        time: now,
                        img: imgSrc
                    });
                    renderMsgList();
                } 
                // 3. 发布图文：添加到图文列表 + 留言列表
                else if (type === "media") {
                    // 添加到图文数据
                    mediaData.push({title, date, img: imgSrc, link:"#", desc: content});
                    renderMedia();
                    // 添加到留言列表（记录发布）
                    msgData.unshift({
                        type: "发布图文",
                        title: title,
                        content: content,
                        time: now,
                        img: imgSrc
                    });
                    renderMsgList();
                }

                // 重置表单
                resetForm();
                alert(type === "msg" ? "留言提交成功！" : "内容发布成功！");
            };

            // 有图片则先读取，无图片直接提交
            if (imgFile) {
                let reader = new FileReader();
                reader.onload = function(event) {
                    handleSubmit(event.target.result);
                }
                reader.readAsDataURL(imgFile);
            } else {
                handleSubmit("");
            }
        }

        // ========== 渲染留言/发布列表 ==========
        function renderMsgList() {
            let html = "";
            msgData.forEach(item=>{
                let typeHtml = `<span class="msg-type">${item.type}</span>`;
                let titleHtml = item.title ? `<div class="msg-title">${item.title}</div>` : "";
                let imgHtml = item.img ? `<img class="msg-img" src="${item.img}" alt="图片">` : "";
                
                html += `
                <div class="msg-item">
                    ${typeHtml}
                    ${titleHtml}
                    <p>${item.content}</p>
                    ${imgHtml}
                    <small>${item.time}</small>
                </div>`;
            })
            document.getElementById("msgList").innerHTML = html;
        }

        // ========== 重置表单 ==========
        function resetForm() {
            document.getElementById("publishType").value = "msg";
            document.getElementById("publishInfo").style.display = "none";
            document.getElementById("publishTitle").value = "";
            document.getElementById("publishDate").value = new Date().toISOString().split("T")[0];
            document.getElementById("msgInput").value = "";
            document.getElementById("msgImg").value = "";
            document.getElementById("msgImgPreview").innerHTML = "未选择图片";
        }

        // ========== 原有功能保留 ==========
        // 渲染文章
        function renderArticle(){
            let html = "";
            articleData.sort((a,b)=>new Date(b.date)-new Date(a.date));
            articleData.forEach(item=>{
                html += `
                <div class="card">
                    <div class="card-body">
                        <h4>${item.title}</h4>
                        <p class="date">发布日期：${item.date}</p>
                        <p>${item.desc}</p>
                        <a href="${item.link}">查看全文</a>
                    </div>
                </div>`
            })
            document.getElementById("articleList").innerHTML = html;
        }

        // 渲染图文
        function renderMedia(){
            let html = "";
            mediaData.sort((a,b)=>new Date(b.date)-new Date(a.date));
            mediaData.forEach(item=>{
                html += `
                <div class="card">
                    <img src="${item.img}" alt="${item.title}">
                    <div class="card-body">
                        <h4>${item.title}</h4>
                        <p class="date">日期：${item.date}</p>
                        <p>${item.desc || "暂无描述"}</p>
                        <a href="${item.link}">查看详情</a>
                    </div>
                </div>`
            })
            document.getElementById("mediaList").innerHTML = html;
        }

        // 搜索功能
        function searchContent(){
            let key = document.getElementById("searchKey").value.trim();
            if(!key){alert("请输入标题或日期搜索！");return;}
            let searchArt = articleData.filter(item=>item.title.includes(key) || item.date.includes(key));
            let searchMed = mediaData.filter(item=>item.title.includes(key) || item.date.includes(key));
            let res = "【搜索结果】\n文章：\n";
            searchArt.forEach(i=>res += i.title + "("+i.date+")\n");
            res += "\n图文/视频：\n";
            searchMed.forEach(i=>res += i.title + "("+i.date+")\n");
            alert(res);
        }

        // 广告轮播
        function autoAd(){
            adIndex = (adIndex + 1) % adImgs.length;
            document.getElementById("adImg").src = adImgs[adIndex];
        }

        // 页面加载初始化
        window.onload = function(){
            renderArticle();
            renderMedia();
            setInterval(autoAd, 3000);
        }
    </script>
</body>
</html>
